version: "2"

run:
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - misspell
    - revive
    - gosec
    - unconvert
    - unparam
    - gocyclo
    - gocritic
    - errorlint
    - bodyclose
    - nilerr
    - godot
    - prealloc
  settings:
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
        - name: indent-error-flow
          severity: warning
        - name: error-return
          severity: warning
        - name: error-strings
          severity: warning
        - name: error-naming
          severity: warning
    gosec:
      excludes:
        - G104
    gocyclo:
      min-complexity: 15
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnamedResult
        - hugeParam
        - rangeValCopy
    stylecheck:
      checks:
        - all
        - -ST1000
        - -ST1003
    errorlint:
      errorf: true
      asserts: true
      comparison: true
  exclusions:
    generated: lax
    rules:
      - path: '(.+)_test\.go'
        linters:
          - gocyclo
          - gosec
          - errcheck
          - gocritic
      - text: 'SA9003:'
        linters:
          - staticcheck
      - text: 'G304:'
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/jrh3k5/cryptonabber-offramp

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true

severity:
  default: warning